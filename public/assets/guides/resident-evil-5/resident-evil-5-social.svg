  <text x="1033" y="470" fill="#99f6e4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="1.4">GUIA REVISADO</text>
  <text x="1033" y="501" fill="#64748b" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18">atlasachievement.com.br</text>
