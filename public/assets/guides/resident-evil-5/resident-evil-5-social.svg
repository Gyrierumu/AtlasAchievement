  <g transform="translate(921 179)">
    <path d="M112 0 224 64v128l-112 64L0 192V64Z" fill="#102d33" stroke="#5eead4" stroke-opacity=".52" stroke-width="4"/>
    <path d="M112 32 196 80v96l-84 48-84-48V80Z" fill="none" stroke="#2dd4bf" stroke-opacity=".36" stroke-width="3"/>
