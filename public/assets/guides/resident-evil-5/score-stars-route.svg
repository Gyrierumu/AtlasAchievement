<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 1500" width="640" height="1500" role="img" aria-labelledby="title desc">
  <title id="title">Rota numerada das 18 Score Stars de Lost in Nightmares</title>
  <desc id="desc">Fluxo vertical: estrelas 1 a 10 na Mansão Spencer, 11 na transição, 12 a 17 na prisão e área alagada das Silver e Gold Crests, e 18 na Library depois do labirinto.</desc>
  <rect width="640" height="1500" rx="24" fill="#0f172a"/>
  <rect x="20" y="20" width="600" height="94" rx="16" fill="#172033" stroke="#5eead4" stroke-width="2"/>
  <text x="44" y="57" fill="#f8fafc" font-family="Arial, sans-serif" font-size="25" font-weight="700">Lost in Nightmares — 18 Score Stars</text>
  <text x="44" y="87" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="17">Ordem única de coleta • todas na mesma jogada</text>
  <text x="320" y="139" fill="#fbbf24" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Diagrama esquemático — não representa escala.</text>

  <rect x="20" y="162" width="600" height="718" rx="18" fill="#111c2f" stroke="#334155" stroke-width="2"/>
  <rect x="36" y="180" width="568" height="48" rx="12" fill="#134e4a"/>
  <text x="54" y="211" fill="#ecfeff" font-family="Arial, sans-serif" font-size="21" font-weight="700">A. Mansão Spencer — #01 a #10</text>
  <path d="M68 258 V820" fill="none" stroke="#5eead4" stroke-width="4" stroke-dasharray="9 9"/>

  <g font-family="Arial, sans-serif">
    <circle cx="68" cy="270" r="22" fill="#0f766e" stroke="#99f6e4" stroke-width="2"/><text x="68" y="277" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">1</text>
    <text x="108" y="264" fill="#f8fafc" font-size="19" font-weight="700">Main Hall — sob a escadaria</text><text x="108" y="288" fill="#cbd5e1" font-size="16">Lanterna central junto à grade inferior</text>
    <circle cx="68" cy="332" r="22" fill="#0f766e" stroke="#99f6e4" stroke-width="2"/><text x="68" y="339" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">2</text>
    <text x="108" y="326" fill="#f8fafc" font-size="19" font-weight="700">Main Hall — segundo andar</text><text x="108" y="350" fill="#cbd5e1" font-size="16">Acima das portas de entrada</text>
    <circle cx="68" cy="394" r="22" fill="#0f766e" stroke="#99f6e4" stroke-width="2"/><text x="68" y="401" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">3</text>
    <text x="108" y="388" fill="#f8fafc" font-size="19" font-weight="700">Main Hall — lustre</text><text x="108" y="412" fill="#cbd5e1" font-size="16">Parte alta e traseira do lustre central</text>
    <circle cx="68" cy="456" r="22" fill="#0f766e" stroke="#99f6e4" stroke-width="2"/><text x="68" y="463" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">4</text>
    <text x="108" y="450" fill="#f8fafc" font-size="19" font-weight="700">Corredor superior</text><text x="108" y="474" fill="#cbd5e1" font-size="16">Gabinete com pratos no fim do corredor</text>
    <circle cx="68" cy="518" r="22" fill="#0f766e" stroke="#99f6e4" stroke-width="2"/><text x="68" y="525" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">5</text>
    <text x="108" y="512" fill="#f8fafc" font-size="19" font-weight="700">Dining Room — galeria</text><text x="108" y="536" fill="#cbd5e1" font-size="16">Parede sudoeste, à esquerda do relógio</text>
    <circle cx="68" cy="580" r="22" fill="#0f766e" stroke="#99f6e4" stroke-width="2"/><text x="68" y="587" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">6</text>
    <text x="108" y="574" fill="#f8fafc" font-size="19" font-weight="700">Dining Room — relógio</text><text x="108" y="598" fill="#cbd5e1" font-size="16">Abra e atire dentro do relógio de pêndulo</text>
    <circle cx="68" cy="642" r="22" fill="#0f766e" stroke="#99f6e4" stroke-width="2"/><text x="68" y="649" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">7</text>
    <text x="108" y="636" fill="#f8fafc" font-size="19" font-weight="700">Restroom</text><text x="108" y="660" fill="#cbd5e1" font-size="16">Acima do mictório, sob a escada</text>
    <circle cx="68" cy="704" r="22" fill="#0f766e" stroke="#99f6e4" stroke-width="2"/><text x="68" y="711" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">8</text>
    <text x="108" y="698" fill="#f8fafc" font-size="19" font-weight="700">Storage room</text><text x="108" y="722" fill="#cbd5e1" font-size="16">Gaiola coberta perto do heat-sensitive paper</text>
    <circle cx="68" cy="766" r="22" fill="#0f766e" stroke="#99f6e4" stroke-width="2"/><text x="68" y="773" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">9</text>
    <text x="108" y="760" fill="#f8fafc" font-size="19" font-weight="700">Corredor gradeado</text><text x="108" y="784" fill="#cbd5e1" font-size="16">No teto, antes da sala dos espinhos</text>
    <circle cx="68" cy="828" r="22" fill="#b45309" stroke="#fde68a" stroke-width="3"/><text x="68" y="835" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">10</text>
    <text x="108" y="822" fill="#fef3c7" font-size="19" font-weight="700">Sala do teto de espinhos</text><text x="108" y="846" fill="#fde68a" font-size="16">Acima do cofre — pegue antes de o teto baixar</text>
  </g>

  <rect x="20" y="900" width="600" height="472" rx="18" fill="#111c2f" stroke="#334155" stroke-width="2"/>
  <rect x="36" y="918" width="568" height="48" rx="12" fill="#1e3a5f"/>
  <text x="54" y="949" fill="#eff6ff" font-family="Arial, sans-serif" font-size="21" font-weight="700">B. Transição, prisão e área alagada — #11 a #17</text>
  <path d="M68 996 V1322" fill="none" stroke="#60a5fa" stroke-width="4" stroke-dasharray="9 9"/>
  <g font-family="Arial, sans-serif">
    <circle cx="68" cy="1008" r="22" fill="#1d4ed8" stroke="#bfdbfe" stroke-width="2"/><text x="68" y="1015" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">11</text>
    <text x="108" y="1002" fill="#f8fafc" font-size="18" font-weight="700">Transição após o crank</text><text x="108" y="1026" fill="#cbd5e1" font-size="16">Antes da descida definitiva</text>
    <circle cx="68" cy="1058" r="22" fill="#1d4ed8" stroke="#bfdbfe" stroke-width="2"/><text x="68" y="1065" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">12</text>
    <text x="108" y="1052" fill="#f8fafc" font-size="18" font-weight="700">Primeiro corredor</text><text x="108" y="1076" fill="#cbd5e1" font-size="16">Quinta cela direita, sob a mão do cadáver</text>
    <circle cx="68" cy="1108" r="22" fill="#1d4ed8" stroke="#bfdbfe" stroke-width="2"/><text x="68" y="1115" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">13</text>
    <text x="108" y="1102" fill="#f8fafc" font-size="18" font-weight="700">Depois do Guardian</text><text x="108" y="1126" fill="#cbd5e1" font-size="16">Parede alta sobre a passagem</text>
    <circle cx="68" cy="1158" r="22" fill="#1d4ed8" stroke="#bfdbfe" stroke-width="2"/><text x="68" y="1165" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">14</text>
    <text x="108" y="1152" fill="#f8fafc" font-size="18" font-weight="700">Base da escada</text><text x="108" y="1176" fill="#cbd5e1" font-size="16">Cela fechada sob a escada, parede esquerda</text>
    <circle cx="68" cy="1208" r="22" fill="#1d4ed8" stroke="#bfdbfe" stroke-width="2"/><text x="68" y="1215" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">15</text>
    <text x="108" y="1202" fill="#f8fafc" font-size="18" font-weight="700">Segundo andar</text><text x="108" y="1226" fill="#cbd5e1" font-size="16">Primeira cela à direita após subir</text>
    <circle cx="68" cy="1258" r="22" fill="#1d4ed8" stroke="#bfdbfe" stroke-width="2"/><text x="68" y="1265" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">16</text>
    <text x="108" y="1252" fill="#f8fafc" font-size="18" font-weight="700">Retorno ao piso inferior</text><text x="108" y="1276" fill="#cbd5e1" font-size="16">Prateleira baixa depois da descida</text>
    <circle cx="68" cy="1308" r="22" fill="#1d4ed8" stroke="#bfdbfe" stroke-width="2"/><text x="68" y="1315" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">17</text>
    <text x="108" y="1302" fill="#f8fafc" font-size="18" font-weight="700">Após o baú da Silver Crest</text><text x="108" y="1326" fill="#cbd5e1" font-size="16">Sexta alcova gradeada sob a escada</text>
    <text x="54" y="1350" fill="#fde68a" font-size="16">Silver + Gold = duas crests; no labirinto posterior, shards exigidos: 1/3/4/4.</text>
  </g>

  <rect x="20" y="1392" width="600" height="86" rx="18" fill="#3f1d45" stroke="#f0abfc" stroke-width="2"/>
  <circle cx="68" cy="1435" r="24" fill="#a21caf" stroke="#fae8ff" stroke-width="2"/>
  <text x="68" y="1442" fill="#fff" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">18</text>
  <text x="108" y="1428" fill="#fae8ff" font-family="Arial, sans-serif" font-size="20" font-weight="700">C. Library — depois do labirinto</text>
  <text x="108" y="1455" fill="#f5d0fe" font-family="Arial, sans-serif" font-size="16">Parede alta ao fundo • confirme 18/18 antes da luta</text>
</svg>
