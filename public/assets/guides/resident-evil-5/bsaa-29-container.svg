<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 760" width="640" height="760" role="img" aria-labelledby="title desc">
  <title id="title">Posição do BSAA Emblem 29 no contêiner do capítulo 6-1</title>
  <desc id="desc">Esquema lateral mostra o jogador permanecendo na plataforma após a Partner Action, o contêiner aberto à esquerda e a trajetória de um explosivo até o emblema escondido.</desc>
  <rect width="640" height="760" rx="24" fill="#0f172a"/>
  <rect x="20" y="20" width="600" height="100" rx="16" fill="#172033" stroke="#5eead4" stroke-width="2"/>
  <text x="44" y="58" fill="#f8fafc" font-family="Arial, sans-serif" font-size="25" font-weight="700">Chapter 6-1 — BSAA Emblem #29</text>
  <text x="44" y="88" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="17">Explosivo no contêiner aberto após a Partner Action</text>
  <text x="320" y="146" fill="#fbbf24" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Diagrama esquemático — não representa escala.</text>

  <rect x="36" y="176" width="568" height="410" rx="18" fill="#111c2f" stroke="#334155" stroke-width="2"/>
  <rect x="62" y="414" width="232" height="112" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="3"/>
  <text x="178" y="552" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">PLATAFORMA — permaneça aqui</text>
  <circle cx="210" cy="380" r="20" fill="#0f766e" stroke="#99f6e4" stroke-width="3"/>
  <path d="M210 400 V454 M210 420 L178 446 M210 420 L244 446" fill="none" stroke="#f8fafc" stroke-width="7" stroke-linecap="round"/>
  <text x="210" y="340" fill="#ecfeff" font-family="Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">1. JOGADOR</text>

  <path d="M300 350 Q400 238 492 330" fill="none" stroke="#fbbf24" stroke-width="5" stroke-dasharray="11 8"/>
  <polygon points="489,318 510,335 484,341" fill="#fbbf24"/>
  <circle cx="316" cy="335" r="11" fill="#f97316" stroke="#ffedd5" stroke-width="3"/>
  <text x="396" y="234" fill="#fef3c7" font-family="Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">2. GRANADA / ROCKET / GL</text>

  <path d="M404 350 L570 350 L570 526 L404 526 Z" fill="#172554" stroke="#60a5fa" stroke-width="4"/>
  <path d="M404 350 L448 392 V486 L404 526" fill="#0f172a" stroke="#60a5fa" stroke-width="3"/>
  <text x="487" y="552" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">CONTÊINER ABERTO À ESQUERDA</text>
  <circle cx="522" cy="438" r="24" fill="#be123c" stroke="#fecdd3" stroke-width="3"/>
  <path d="M511 438 H533 M522 427 V449" stroke="#fff1f2" stroke-width="5"/>
  <text x="522" y="402" fill="#ffe4e6" font-family="Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">3. EMBLEMA</text>

  <rect x="36" y="608" width="568" height="116" rx="16" fill="#3b2410" stroke="#fbbf24" stroke-width="2"/>
  <text x="58" y="640" fill="#fef3c7" font-family="Arial, sans-serif" font-size="18" font-weight="700">PONTO SEM RETORNO</text>
  <text x="58" y="670" fill="#fde68a" font-family="Arial, sans-serif" font-size="17">Não desça da plataforma antes da explosão.</text>
  <text x="58" y="698" fill="#fde68a" font-family="Arial, sans-serif" font-size="17">Sem explosivo? Reinicie 6-1 levando grenade/rocket.</text>
</svg>
