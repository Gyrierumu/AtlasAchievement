services:
  - type: web
    name: master-trophy-guide
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_PATH
        value: /data/database.sqlite
      - key: UPLOAD_DIR
        value: /data/uploads
    disk:
      name: master-trophy-guide-data
      mountPath: /data
      sizeGB: 1
