services:
  - type: web
    name: master-trophy-guide
    env: node
    plan: starter
    buildCommand: if [ -f server.js ]; then npm ci && npm run build; else cd .. && npm ci && npm run build; fi
    preDeployCommand: if [ -f server.js ]; then npm run db:setup; else cd .. && npm run db:setup; fi
    startCommand: if [ -f server.js ]; then npm start; else cd .. && npm start; fi
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTO_IMPORT_GUIDES_ON_START
        value: "true"
      - key: DATABASE_PATH
        value: /data/database.sqlite
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: APP_URL
        value: https://atlasachievement.com.br
      - key: CANONICAL_ORIGIN
        value: https://atlasachievement.com.br
      - key: CORS_ALLOWED_ORIGINS
        value: https://atlasachievement.com.br
      - key: GA_MEASUREMENT_ID
        value: G-QNPM6F50XY
    disk:
      name: master-trophy-guide-data
      mountPath: /data
      sizeGB: 1
