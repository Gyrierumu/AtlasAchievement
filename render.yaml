services:
  - type: web
    name: master-trophy-guide
    env: node
    plan: starter
    buildCommand: npm ci
    preDeployCommand: npm run db:setup
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_PATH
        value: /data/database.sqlite
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: APP_URL
        value: https://atlasachievement.com.br
      - key: CANONICAL_ORIGIN
        value: https://atlasachievement.com.br
      - key: CORS_ALLOWED_ORIGINS
        value: https://atlasachievement.com.br
      - key: GA_MEASUREMENT_ID
        value: G-QNPM6F50XY
    disk:
      name: master-trophy-guide-data
      mountPath: /data
      sizeGB: 1
